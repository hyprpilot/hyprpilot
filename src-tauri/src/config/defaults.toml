[daemon]

[daemon.window]
mode = "anchor"

[daemon.window.anchor]
edge = "right"
margin = 0
width = "40%"

[daemon.window.center]
width = "50%"
height = "50%"

[logging]
level = "info"

# D5 design tokens (K-250). The Rust config layer is the single source
# of truth — `ui/src/assets/styles.css` declares no literal theme values
# on :root. `applyTheme()` runs synchronously in main.ts before the app
# mounts, so there's no FOUC window.

[ui.theme.font]
mono = "ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, Consolas, monospace"
sans = "'Inter', ui-sans-serif, system-ui, sans-serif"

[ui.theme.window]
default = "#16181d"
edge = "#c99bf0"

[ui.theme.surface]
default = "#1c1f26"
bg = "#16181d"
alt = "#21252d"
compose = "#21252d"
text = "#16181d"

[ui.theme.surface.card.user]
bg = "#1c1f26"

[ui.theme.surface.card.assistant]
bg = "#1c1f26"

[ui.theme.fg]
default = "#d8dde5"
ink_2 = "#b4b9c3"
dim = "#6b7280"
faint = "#4a5060"

[ui.theme.border]
default = "#2a2e38"
soft = "#353a46"
focus = "#4a5060"

[ui.theme.accent]
default = "#c99bf0"
user = "#e8c86c"
user_soft = "#2d2818"
assistant = "#8ac9a0"
assistant_soft = "#1d2822"

[ui.theme.state]
idle = "#7fcf8a"
stream = "#e8c86c"
pending = "#e06f6f"
awaiting = "#e0a060"
working = "#7fb8ff"

[ui.theme.kind]
read = "#7fb8ff"
write = "#e480d4"
bash = "#e8b26c"
search = "#5fcfd8"
agent = "#c99bf0"
think = "#7a8192"
terminal = "#8ac9a0"
acp = "#b8d4ff"

[ui.theme.status]
ok = "#7fcf8a"
warn = "#e0a060"
err = "#e06f6f"

[ui.theme.permission]
bg = "#1f1a12"
bg_active = "#2a1f12"

[agent]
default = "claude-code"

[[agents]]
id = "claude-code"
provider = "acp-claude-code"
# TODO: temporary for testing
model = "haiku"
command = "bunx"
args = ["--bun", "@agentclientprotocol/claude-agent-acp"]

[[agents]]
id = "codex"
provider = "acp-codex"
command = "bunx"
args = ["--bun", "@zed-industries/codex-acp"]

[[agents]]
id = "opencode"
provider = "acp-opencode"
command = "opencode"
args = ["acp"]
