[daemon]

[daemon.window]
mode = "anchor"

[daemon.window.anchor]
edge = "right"
margin = 0
width = "40%"
# `height` intentionally unset — the surface pins top + bottom + edge so it
# fills the monitor vertically. Set an explicit pixel or percent value to
# use a fixed-height anchored surface instead.

[daemon.window.center]
width = "50%"
height = "50%"

[logging]
level = "info"

[ui.theme.font]
family = "ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, Consolas, monospace"

[ui.theme.window]
default = "#1e2127"
edge = "#d3b051"

[ui.theme.surface]
compose = "#2c333d"
text = "#1e2127"

[ui.theme.surface.card.user]
bg = "#2c333d"

[ui.theme.surface.card.assistant]
bg = "#22282f"

[ui.theme.fg]
default = "#abb2bf"
dim = "#7c8a9d"
muted = "#5c6370"

[ui.theme.border]
default = "#4b5263"
soft = "#2c333d"
focus = "#6c778d"

[ui.theme.accent]
default = "#abb2bf"
user = "#e5c07b"
assistant = "#98c379"

[ui.theme.state]
idle = "#98c379"
stream = "#e5c07b"
pending = "#e06c75"
awaiting = "#d19a66"
