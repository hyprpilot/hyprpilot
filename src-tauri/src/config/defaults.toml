[daemon]

[daemon.window]
mode = "anchor"

[daemon.window.anchor]
edge = "right"
margin = 0
width = "40%"

[daemon.window.center]
width = "50%"
height = "50%"

[logging]
level = "info"

# D5 design tokens (K-250). The Rust config layer is the single source
# of truth — `ui/src/assets/styles.css` declares no literal theme values
# on :root. `applyTheme()` runs synchronously in main.ts before the app
# mounts, so there's no FOUC window.

[ui.theme.font]
mono = "ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, Consolas, monospace"
sans = "'Inter', ui-sans-serif, system-ui, sans-serif"

[ui.theme.window]
default = "#0b0d12"
edge = "#c99bf0"

[ui.theme.surface]
default = "#12141a"
bg = "#0b0d12"
alt = "#181b22"
compose = "#181b22"
text = "#0b0d12"

[ui.theme.surface.card.user]
bg = "#12141a"

[ui.theme.surface.card.assistant]
bg = "#12141a"

[ui.theme.fg]
default = "#d8dde5"
ink_2 = "#a8adb7"
dim = "#6b7280"
faint = "#3e4454"

[ui.theme.border]
default = "#20242e"
soft = "#2b2f3b"
focus = "#3e4454"

[ui.theme.accent]
default = "#c99bf0"
user = "#e8c86c"
user_soft = "#2d2818"
assistant = "#8ac9a0"
assistant_soft = "#1d2822"

[ui.theme.state]
idle = "#7fcf8a"
stream = "#e8c86c"
pending = "#e06f6f"
awaiting = "#e0a060"
working = "#7fb8ff"

[ui.theme.kind]
read = "#7fb8ff"
write = "#e480d4"
bash = "#e8b26c"
search = "#5fcfd8"
agent = "#c99bf0"
think = "#7a8192"
terminal = "#8ac9a0"
acp = "#b8d4ff"

[ui.theme.status]
ok = "#7fcf8a"
warn = "#e0a060"
err = "#e06f6f"

[ui.theme.permission]
bg = "#18130a"
bg_active = "#22180d"

[agent]
default = "claude-code"

[[agents]]
id = "claude-code"
provider = "acp-claude-code"
# TODO: temporary for testing
model = "haiku"
command = "bunx"
args = ["--bun", "@agentclientprotocol/claude-agent-acp"]

[[agents]]
id = "codex"
provider = "acp-codex"
command = "bunx"
args = ["--bun", "@zed-industries/codex-acp"]

[[agents]]
id = "opencode"
provider = "acp-opencode"
command = "opencode"
args = ["acp"]
