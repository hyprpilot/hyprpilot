---
# https://taskfile.dev

version: "3"

vars:
  tauri: ./node_modules/.bin/tauri

env:
  RUST_LOG: hyprpilot=debug

tasks:
  install:
    desc: Install Rust and frontend dependencies.
    cmds:
      - cargo fetch --manifest-path src-tauri/Cargo.toml
      - pnpm install

  test:
    desc: Run Rust (cargo-nextest) and frontend test suites; both finish before task fails.
    deps: [test:rust, test:ui]

  test:rust:
    desc: Run the Rust nextest suite, surfacing every failure (no fail-fast).
    cmds:
      - cargo nextest run --manifest-path src-tauri/Cargo.toml --all-targets --no-fail-fast

  test:ui:
    desc: Run the Vitest component suite (colocated *.test.ts).
    cmds:
      - pnpm --filter hyprpilot-ui test

  test:e2e:
    desc: Run Playwright e2e against the bridged debug binary.
    cmds:
      - TAURI_CONFIG="$(cat src-tauri/tauri.conf.e2e.json)" cargo build --manifest-path src-tauri/Cargo.toml --features e2e-testing
      - pnpm --filter hyprpilot-ui build
      - pnpm --filter hyprpilot-e2e test

  test:e2e:live:
    desc: Run Playwright e2e in tauri-mode against a real daemon spawned with claude-code + haiku (tests/e2e/fixtures/live-config.toml). Network-bound — bunx fetches the ACP package on first run.
    env:
      HYPRPILOT_E2E_MODE: tauri
      HYPRPILOT_E2E_CONFIG: tests/e2e/fixtures/live-config.toml
    cmds:
      - cargo build --manifest-path src-tauri/Cargo.toml
      - pnpm --filter hyprpilot-ui build
      - pnpm --filter hyprpilot-e2e test

  format:
    desc: Format Rust and every pnpm package.
    deps: [format:rust, format:node]

  format:rust:
    desc: Run `cargo fmt` across the Rust workspace.
    cmds:
      - cargo fmt --manifest-path src-tauri/Cargo.toml --all

  format:node:
    desc: Run the `format` script in every pnpm package that defines one.
    cmds:
      - pnpm -r --parallel --if-present run format

  lint:
    desc: Lint Rust and every pnpm package.
    deps: [lint:rust, lint:node]

  lint:rust:
    desc: "`cargo fmt --check` + `cargo clippy` on the Rust workspace."
    cmds:
      - cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  lint:node:
    desc: Run the `lint` script in every pnpm package that defines one.
    cmds:
      - pnpm -r --parallel --if-present run lint

  run:
    desc: Run the Tauri app with live-reload.
    cmds:
      - "{{ .tauri }} dev -- -- {{ .CLI_ARGS }}"

  cli:
    desc: Invoke the built debug binary against an already-running
    cmds:
      - ./target/debug/hyprpilot {{ .CLI_ARGS }}

  build:
    desc: Build a debug Tauri bundle.
    cmds:
      - "{{ .tauri }} build --debug"

  release:
    desc: Build a release Tauri bundle.
    cmds:
      - "{{ .tauri }} build"
