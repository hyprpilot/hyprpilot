---
# https://taskfile.dev

version: "3"

vars:
  tauri: ./ui/node_modules/.bin/tauri

env:
  RUST_LOG: hyprpilot=debug

tasks:
  install:
    desc: Install Rust and frontend dependencies.
    cmds:
      - cargo fetch --manifest-path src-tauri/Cargo.toml
      - pnpm --dir ui install

  run:
    desc: Run the Tauri app with live-reload.
    cmds:
      - "{{ .tauri }} dev"

  test:
    desc: Run Rust and frontend test suites.
    cmds:
      - cargo test --manifest-path src-tauri/Cargo.toml --all-targets -v
      - pnpm --dir ui test -v
      - pnpm --dir ui test:e2e

  format:
    desc: Format Rust and frontend sources.
    cmds:
      - cargo fmt --manifest-path src-tauri/Cargo.toml --all
      - pnpm --dir ui format

  lint:
    desc: Lint Rust and frontend sources.
    cmds:
      - cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - pnpm --dir ui lint

  build:
    desc: Build a debug Tauri bundle.
    cmds:
      - "{{ .tauri }} build --debug"

  release:
    desc: Build a release Tauri bundle.
    cmds:
      - "{{ .tauri }} build"
