---
name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # release-please reads conventional-commit history and opens
          # a "Release PR" bumping versions in src-tauri/Cargo.toml +
          # ui/package.json + CHANGELOG.md. Merging the PR cuts a
          # `vX.Y.Z` git tag + creates the GitHub Release. The tag
          # then triggers `release.yml` for the binary tarball + AUR
          # publish.
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
